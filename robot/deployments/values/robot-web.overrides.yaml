fullnameOverride: "robot-web"

image:
  repository: ${image_repository}
  tagPrefix: "web-v"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx-external"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    kubernetes.io/tls-acme: "true"
    external-dns.alpha.kubernetes.io/hostname: robot.zeyaddeeb.com
  hosts:
    - host: robot.zeyaddeeb.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: robot-zeyaddeeb-tls
      hosts:
        - robot.zeyaddeeb.com

env:
  NODE_ENV: "production"
  APP_NAME: "robot-web"
  BASE_URL: "https://robot.zeyaddeeb.com"

livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http
