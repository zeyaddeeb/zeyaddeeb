fullnameOverride: "robot-ws"

image:
  repository: ${image_repository}
  tagPrefix: "ws-server-v"

service:
  type: ClusterIP
  port: 9001

ingress:
  enabled: true
  className: "nginx-external"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    kubernetes.io/tls-acme: "true"
    external-dns.alpha.kubernetes.io/hostname: ws.robot.zeyaddeeb.com
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$binary_remote_addr"
  hosts:
    - host: ws.robot.zeyaddeeb.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: robot-ws-zeyaddeeb-tls
      hosts:
        - ws.robot.zeyaddeeb.com

env:
  WS_BIND_ADDR: "0.0.0.0:9001"

persistence:
  enabled: true
  size: 5Gi
  mountPath: /data
  storageClassName: "gp3"

workingDir: /data

livenessProbe:
  httpGet:
    path: /health
    port: 9001
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 9001
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  limits:
    cpu: "1"
    memory: "512Mi"
  requests:
    cpu: "500m"
    memory: "256Mi"
